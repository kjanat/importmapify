name: CI
run-name: >-
  ${{ github.event_name == 'pull_request'
  && format('PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title)
  || startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name)
  || format('CI {0}', github.ref_name) }}

on:
  push: { branches: [master], tags: ["v*.*.*"] }
  pull_request: { branches: [master] }

permissions: { contents: read }
defaults: { run: { shell: pwsh } }
env: { DENO_NO_PACKAGE_JSON: 1 }

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - { uses: actions/checkout@v7, with: { persist-credentials: false } }
      - { uses: actions/setup-node@v7, with: { node-version-file: .node-version, package-manager-cache: false } }
      - uses: oven-sh/setup-bun@v2
      - uses: kjanat/runner@master
      - run: runner install -f build typecheck check test:coverage test:smoke
      - run: node --run runbin -- --help

  npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: { contents: read, id-token: write }
    environment: { name: npm, url: "${{ steps.meta.outputs.url }}" }
    steps:
      - { uses: actions/checkout@v7, with: { persist-credentials: false } }
      - { uses: actions/setup-node@v7, with: { node-version-file: .node-version, package-manager-cache: false, registry-url: https://registry.npmjs.org } }
      - { uses: oven-sh/setup-bun@v2 }
      - { uses: kjanat/runner@master }
      - { run: runner install -f }
      - { run: run -q url:npm | Add-Content -Path $env:GITHUB_OUTPUT, id: meta }
      - run: $v=jq -r .version package.json;if ($env:GITHUB_REF_NAME -ne "v$v") { "::error file=package.json,line=3,title=Tag mismatch::Tag $env:GITHUB_REF_NAME does not match package version $v"; exit 1 }
      - name: Publish to npm
        env: { NPM_CONFIG_PROVENANCE: "${{ vars.NPM_CONFIG_PROVENANCE }}" }
        run: |
          $tag = $env:GITHUB_REF_NAME -like '*-*' ? 'beta' : 'latest'
          bunx npm@11 publish --access public --tag $tag; exit $LASTEXITCODE

  jsr:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: npm
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: { contents: read, id-token: write }
    environment: { name: jsr, url: "${{ steps.meta.outputs.url }}" }
    steps: [
      { uses: actions/checkout@v7, with: { persist-credentials: false } },
      { uses: oven-sh/setup-bun@v2 },
      { uses: kjanat/runner@master },
      { run: runner install -f build },
      { run: run -q url:jsr | Add-Content -Path $env:GITHUB_OUTPUT, id: meta },
      { run: deno task publish },
    ]

  gh-release:
    needs: [npm, jsr]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: { contents: write }
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const { owner, repo } = context.repo
            await github.rest.repos.createRelease({
              owner, repo,
              tag_name: tag,
              generate_release_notes: true,
              prerelease: tag.includes('-'),
            })
