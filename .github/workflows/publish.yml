name: CI
run-name: >-
  ${{ github.event_name == 'pull_request'
  && format('PR #{0}: {1}', github.event.pull_request.number, github.event.pull_request.title)
  || startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name)
  || format('CI {0}', github.ref_name) }}

on:
  push: { branches: [master], tags: ["v*.*.*"] }
  pull_request: { branches: [master] }

permissions: { contents: read }
defaults: { run: { shell: pwsh } }

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - { uses: actions/checkout@v7, with: { persist-credentials: false } }
      - { uses: actions/setup-node@v7, with: { node-version-file: .node-version, package-manager-cache: false } }
      - uses: oven-sh/setup-bun@v2
      - uses: kjanat/runner@master
      - run: runner install -f build typecheck check test:coverage test:smoke
      - run: node --run runbin --help

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: { name: npm, url: "${{ steps.meta.outputs.url }}" }
    permissions: { contents: write, id-token: write }
    steps:
      - { uses: actions/checkout@v7, with: { persist-credentials: false } }
      - uses: actions/setup-node@v7
        with: { node-version-file: .node-version, package-manager-cache: false, registry-url: https://registry.npmjs.org }
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Validate tag
        id: meta
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json; $version = $pkg.version
          $url = "https://npm.im/package/{0}/v/{1}" -f $pkg.name, $version; "url=$url" | Add-Content -Path $env:GITHUB_OUTPUT
          if ($env:GITHUB_REF_NAME -ne "v$version") { "::error file=package.json,line=3,title=Tag mismatch::Tag $env:GITHUB_REF_NAME does not match package version $version"; exit 1 }
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: ${{ vars.NPM_CONFIG_PROVENANCE }}
        run: |
          $tag = $env:GITHUB_REF_NAME -like '*-*' ? 'beta' : 'latest'
          bunx npm@11 publish --access public --tag $tag; exit $LASTEXITCODE
      - name: Create GitHub release
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          $args = @($env:GITHUB_REF_NAME, '--verify-tag', '--generate-notes')
          if ($env:GITHUB_REF_NAME -like '*-*') { $args += '--prerelease' }
          gh release create @args; exit $LASTEXITCODE
