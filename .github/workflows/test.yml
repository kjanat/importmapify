# No `concurrency` here: when Publish calls this via workflow_call, `github.workflow`
# resolves to the caller ("Publish"), so a shared group would deadlock caller vs callee.
---
name: Test
on: { pull_request: { branches: [master] }, push: { branches: [master] }, workflow_call: null }

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read, id-token: write }
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }
      - uses: ./.github/actions/setup-ts
        with: { install-bun: true, install-node: true }
      - run: bun install --frozen-lockfile
      - name: Build (runs attw + publint + unused-export checks)
        run: bun run build
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test --coverage
      - name: Node smoke test (dist)
        run: node scripts/smoke.mjs
      - name: CLI smoke test (dist)
        run: node dist/cli.js --help
